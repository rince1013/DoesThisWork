{{define "index"}}{{template "base" .}}{{end}}

{{define "title"}}Does This Work? — Plan a hangout{{end}}

{{define "content"}}
<div class="page-index">
  <header class="hero">
    <div class="hero-icon">🗓️</div>
    <h1>Does This Work?</h1>
    <p class="hero-sub">Plan a hangout. No account needed.</p>
  </header>

  <form class="card" method="POST" action="/events">
    <div class="field">
      <label for="name">What's the occasion?</label>
      <input id="name" name="name" type="text" placeholder="e.g. Summer BBQ, Game Night…" required autocomplete="off">
    </div>

    <div class="field">
      <label for="description">Details <span class="optional">(optional)</span></label>
      <input id="description" name="description" type="text" placeholder="Location, vibe, anything helpful…" autocomplete="off">
    </div>

    <div class="field">
      <label>Pick some dates to vote on</label>
      <div id="dates-list">
        <input class="date-input" name="dates" type="date" required>
        <input class="date-input" name="dates" type="date">
        <input class="date-input" name="dates" type="date">
      </div>
      <button type="button" class="btn-ghost" onclick="addDateField()">+ Add another date</button>
    </div>

    <button type="submit" class="btn-primary">Create &amp; Get Link →</button>
  </form>
</div>
{{end}}
